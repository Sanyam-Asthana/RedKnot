<html>
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>
        <title>RedKnot</title>
        <style>
            body {
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <section class="text-gray-800 body-font mt-36">
            <div
                class="container mx-auto flex px-5 py-24 md:flex-row flex-col items-center"
            >
                <div
                    class="lg:flex-grow md:w-1/2 lg:pr-24 md:pr-16 flex flex-col md:items-start md:text-left mb-16 md:mb-0 items-center text-center"
                >
                    <h1
                        class="title-font sm:text-5xl text-4xl mb-4 font-medium text-gray-900"
                    >
                        RedKnot
                    </h1>
                    <p class="mb-5 leading-relaxed text-2xl">
                        A simple tool to graph your project dependencies
                    </p>

                    <h1
                        class="text-gray-700 bg-gray-300 border border-gray-500 rounded-lg py-3 px-5 mb-5 text-lg"
                    >
                        pip install redknot
                    </h1>

                    <div class="flex justify-center">
                        <button
                            id="copy"
                            class="inline-flex text-white bg-red-600 border-0 py-2 px-6 mr-3 focus:outline-none hover:bg-red-700 rounded text-lg animate-bounce"
                            onclick="navigator.clipboard.writeText('pip install redknot'); document.getElementById('copy').innerHTML='Copied!';"
                        >
                            Copy!
                        </button>

                        <a href="https://github.com/Sanyam-Asthana/RedKnot">
                            <button
                                class="inline-flex text-black bg-gray-300 border-0 py-2 px-6 mr-3 focus:outline-none hover:bg-gray-400 rounded text-lg"
                            >
                                GitHub
                            </button>
                        </a>

                        <a href="https://pypi.org/projects/redknot">
                            <button
                                class="inline-flex text-black bg-gray-300 border-0 py-2 px-6 focus:outline-none hover:bg-gray-400 rounded text-lg"
                            >
                                PyPI
                            </button>
                        </a>
                    </div>
                </div>
                <div class="lg:max-w-lg lg:w-full md:w-1/2 w-5/6">
                    <img
                        class="object-cover object-center rounded"
                        alt="hero"
                        src="logo.png"
                    />
                </div>
            </div>
        </section>
    </body>
</html>
